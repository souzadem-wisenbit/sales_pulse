<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <linearGradient id="glow" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6c63ff"/>
            <stop offset="100%" stop-color="#00e5ff"/>
        </linearGradient>
        <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <!-- Background is fully transparent -->
    <rect width="100" height="100" fill="transparent" rx="20"/>
    
    <!-- Pulse Line / Brain / Trend Graph -->
    <path d="M 15 55 L 35 55 L 45 25 L 60 75 L 75 40 L 85 40" 
          fill="none" 
          stroke="url(#glow)" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#neon)"/>
    
    <!-- Accent dots -->
    <circle cx="85" cy="40" r="6" fill="#00e5ff" filter="url(#neon)"/>
</svg>
