<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SalesPulse Mission Control</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h1>🛰️ Mission Control</h1>
        <small>SalesPulse · operação da frota</small>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item" id="nav-fleet" onclick="showFleet()">
          <span>🗺️</span><span class="co-name">Frota</span>
        </div>
        <div class="nav-section">Instâncias</div>
        <div id="nav-instances"></div>
      </nav>
      <div class="sidebar-footer">
        <button class="btn primary" onclick="openProvisionModal()">➕ Nova instância</button>
        <button class="btn" onclick="openRegisterModal()">🔗 Registrar existente</button>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>
  <div id="modal-root"></div>
  <script src="app.js"></script>
</body>
</html>
